server:
  port: ${SERVER_PORT:9090}

spring:
  sql:
    init:
      mode: always
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  jwt:
    secret: f8a3b7c1d9e2f0a4b6c8d1e3f5a7b9c2d4e6f8a0b2c4d6e8f0a1b3c5d7e9f1
    access-token-expiration-ms: 86400000    # 24 hours (dev-friendly)
    refresh-token-expiration-ms: 604800000  # 7 days

storage:
  location: ${STORAGE_LOCATION:uploads}

chat:
  attachments:
    max-file-size-bytes: ${CHAT_ATTACHMENT_MAX_FILE_SIZE_BYTES:26214400}

logging:
  level:
    root: INFO
    com.chatapp: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
