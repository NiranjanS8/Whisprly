server:
  port: ${SERVER_PORT:9090}

spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}
    refresh-token-expiration-ms: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  auth:
    google:
      client-id: ${APP_GOOGLE_CLIENT_ID:}
    refresh-token:
      store: ${APP_AUTH_REFRESH_TOKEN_STORE:memory}
      redis-key-prefix: ${APP_AUTH_REFRESH_TOKEN_REDIS_KEY_PREFIX:chatapp:auth:refresh}
  presence:
    store: ${APP_PRESENCE_STORE:memory}
    redis-key-prefix: ${APP_PRESENCE_REDIS_KEY_PREFIX:chatapp:presence}
    session-ttl-seconds: ${APP_PRESENCE_SESSION_TTL_SECONDS:1800}

storage:
  location: ${STORAGE_LOCATION:uploads}

chat:
  attachments:
    max-file-size-bytes: ${CHAT_ATTACHMENT_MAX_FILE_SIZE_BYTES:26214400}

logging:
  level:
    root: INFO
    com.chatapp: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
